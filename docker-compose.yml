services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./exports:/exports
      - ./services/api/app:/app/app

  mqtt_subscriber:
    build:
      context: .
      dockerfile: services/mqtt_subscriber/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mosquitto
      - api
    volumes:
      - ./services/mqtt_subscriber/app:/app/app

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ./services/dashboard/app:/app/app
      - ./services/dashboard/.streamlit:/app/.streamlit

volumes:
  postgres_data:
